defaults:
  - model: unet
  - loss: dice
  - optimizer: Adam
  - learning_rate: 1e-4

model:
  name: unet
  params:
    in_channels: 1
    out_channels: 1
    encoder_weights: None
    decoder_attention_type: None
    return_logits: False
    
loss:
  name: dice
  params:
    smooth: 1e-6

optimizer:
  name: Adam
  learning_rate: 1e-4
  weight_decay: 0

metrics:
  - name: dice
    params:
      smooth: 1e-6
  - name: iou
    params:
      smooth: 1e-6
  - name: accuracy
    params:
      smooth: 1e-6
  - name: precision
    params:
      smooth: 1e-6

data:
  base_dir: /home/loai/Images/DataTest/UC1_data

training:
  epochs: 100
  batch_size: 16
  device: cuda
  shuffle: true
  save_best_only: true
  checkpoint_dir: /home/loai/Documents/code/RSMLExtraction/RSA_deep_working/Models/Checkpoints/

