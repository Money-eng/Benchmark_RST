defaults:
  - model: unet
  - loss: dice
  - optimizer: Adam
  - learning_rate: 1e-4

model:
  name: segformer
  params:
    in_channels: 1
    out_channels: 1
    encoder_name: efficientnet-b0
    encoder_weights: null
    decoder_attention_type: null
    return_logits: False

loss:
  name: bce
  params:
    include_background: True,
    to_onehot_y: False,
    sigmoid: False,
    softmax: False,
    squared_pred: False,
    jaccard: False,
    reduction: LossReduction.MEAN,
    smooth_nr: 1e-5,
    smooth_dr: 1e-5,
    batch: False,

optimizer:
  name: Adam
  learning_rate: 1E-5
  weight_decay: 0.0

metrics:
  threshold: 0.5
  gpu:
    - { name: "ari_score" }
    - { name: "dice" }
    - { name: "generalized_dice" }
    - { name: "f1_score" }
    - { name: "mean_iou" }
    - { name: "pixel_accuracy" }
    - { name: "precision" }
    - { name: "recall" }
    - { name: "specificity" }
    - { name: "surface_distance" }
    - { name: "surface_dice" }
    #- { name: "hausdorff_distance" }
    - { name: "normalized_mutual_information" }
  cpu:
    - { name: "variation_of_information" }
    - { name: "betti0_jaccard_ratio" }
    - { name: "betti0_relative_error" }
    - { name: "betti0_variation_index" }
    - { name: "euler_charac_jaccard_ratio" }
    - { name: "euler_charac_relative_error" }
    - { name: "euler_charac_variation_index" }
    - { name: "persistence_bottleneck" }
    #- { name: "persistence_wasserstein" }


data:
  base_dir: /home/loai/data/UC1_data
  batch_size: 16

training:
  epochs: 500
  device: cuda
  save_best_only: true
  checkpoint_dir: /home/loai/Documents/code/RSMLExtraction/RSA_deep_working/Models/Checkpoints

rst:
  jar_path: /home/loai/Documents/code/RSMLExtraction/RootSystemTracker/target/rootsystemtracker-1.6.1-jar-with-dependencies.jar
