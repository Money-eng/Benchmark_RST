data:
  base_dir: RSA_deep_working/Data
  patch_size: 256
  batch_size: 16

training:
  epochs: 500
  epochs_btw_eval: 1
  device: cuda
  save_best_only: true
  early_stopping:
    metric: f1_score
    patience: 5
    delta: 0.01
  lr_scheduler:
    name: ReduceLROnPlateau
    mode: min
    factor: 0.5
    patience: 5
  checkpoint_dir: RSA_deep_working/Models/Checkpoints
  log_dir: RSA_deep_working/Models/Logs


model:
  name: Unet
  pretrained: false
  params:
    in_channels: 1
    out_channels: 1
    encoder_name: efficientnet-b0
    encoder_weights: null
    decoder_attention_type: null
    return_logits: False

optimizer:
  name: AdamW
  learning_rate: 1e-4
  weight_decay: 1e-5

loss:
  name: BCE
  params:
    weight: null
    size_average: null
    reduce: null
    reduction: mean
    pos_weight: null

metrics:
  threshold: 0.5
  gpu:
    - { name: "ari_score" }
    - { name: "dice" }
    - { name: "generalized_dice" }
    - { name: "f1_score" }
    - { name: "mean_iou" }
    - { name: "pixel_accuracy" }
    - { name: "precision" }
    - { name: "recall" }
    - { name: "specificity" }
    - { name: "surface_distance" }
    - { name: "surface_dice" }
    #- { name: "hausdorff_distance" }
    - { name: "normalized_mutual_information" }
  cpu:
    - { name: "variation_of_information" }
    - { name: "betti0_jaccard_ratio" }
    - { name: "betti0_relative_error" }
    - { name: "betti0_variation_index" }
    - { name: "euler_charac_jaccard_ratio" }
    - { name: "euler_charac_relative_error" }
    - { name: "euler_charac_variation_index" }
    - { name: "persistence_bottleneck" }
    #- { name: "persistence_wasserstein" }
  mtg:
    #- { name: "area_below_intercep" }
    #- { name: "dtw_below_intercep" }
    - { name: "number_of_organs_ratio"}
    - { name: "number_of_plants_ratio"}

rst:
  jar_path: RootSystemTracker/target/rootsystemtracker-1.6.1-jar-with-dependencies.jar
