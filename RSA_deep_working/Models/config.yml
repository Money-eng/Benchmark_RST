defaults:
  - model: unet
  - loss: dice
  - optimizer: Adam
  - learning_rate: 1e-4

model:
  name: unet
  params:
    in_channels: 1
    out_channels: 1
    encoder_weights: null
    decoder_attention_type: null
    return_logits: False
    
loss:
  name: dice
  params:
    smooth: 1e-6

optimizer:
  name: Adam
  learning_rate: 1e-3
  weight_decay: 0

metrics:
  gpu:
    - { name: "dice" }
    - { name: "iou" }
    - { name: "pixel_accuracy" }
    - { name: "precision" }
    - { name: "recall" }
    - { name: "specificity" }
  cpu:
    - { name: "connectivity" }
    - { name: "ari_index" }
    - { name: "are_error" }
    - { name: "vi_index" }
    - { name: "betti0_difference" }
    - { name: "euler_charac_difference" }

data:
  base_dir: /home/loai/data/UC1_data
  batch_size: 8

training:
  epochs: 100
  device: cuda
  save_best_only: true
  checkpoint_dir: /home/loai/Documents/code/RSMLExtraction/RSA_deep_working/Models/Checkpoints

rst:
  jar_path: /home/loai/Documents/code/RSMLExtraction/RootSystemTracker/target/rootsystemtracker-1.6.1-jar-with-dependencies.jar